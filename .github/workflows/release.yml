# ─────────────────────────────────────────────────────────────────────────────
# Chalie Interface — Release Workflow
#
# Triggers on version tags (v1.0.0, v2.3.1, etc.).
# Cross-compiles daemon.ts to four self-contained binaries from a single
# ubuntu-latest runner using `deno compile`.
#
# Output binaries:
#   daemon-linux-x64        Linux x86_64
#   daemon-mac-x64          macOS Intel
#   daemon-mac-arm64        macOS Apple Silicon
#   daemon-windows-x64.exe  Windows x86_64
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#   → GitHub Actions compiles all four targets and publishes a release.
#
# No secrets needed — Deno and the GITHUB_TOKEN are pre-configured in Actions.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  build:
    name: Compile ${{ matrix.target.name }}
    runs-on: ubuntu-latest

    strategy:
      # Compile all four targets in parallel — each matrix entry is a
      # separate job. If one fails, the others continue.
      fail-fast: false
      matrix:
        target:
          - name: Linux x86_64
            deno_target: x86_64-unknown-linux-gnu
            output: dist/daemon-linux-x64
            artifact: daemon-linux-x64

          - name: macOS Intel
            deno_target: x86_64-apple-darwin
            output: dist/daemon-mac-x64
            artifact: daemon-mac-x64

          - name: macOS Apple Silicon
            deno_target: aarch64-apple-darwin
            output: dist/daemon-mac-arm64
            artifact: daemon-mac-arm64

          - name: Windows x86_64
            deno_target: x86_64-pc-windows-msvc
            output: dist/daemon-windows-x64.exe
            artifact: daemon-windows-x64.exe

    steps:
      # ── 1. Check out source ──────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4

      # ── 2. Install Deno ──────────────────────────────────────────────────
      # Pin to a specific Deno version for reproducible builds.
      # Update this when you want to upgrade the Deno runtime.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      # ── 3. Compile ───────────────────────────────────────────────────────
      # `deno compile` bundles daemon.ts + all its dependencies + a V8
      # snapshot into a single self-contained binary. The binary includes
      # the Deno runtime — no Deno installation required on the end-user's
      # machine.
      #
      # --allow-net    : HTTP server + gateway fetch calls
      # --allow-read   : Reading data-dir and local files
      # --allow-write  : Writing to data-dir
      # --allow-env    : Reading environment variables (optional, good practice)
      - name: Compile for ${{ matrix.target.name }}
        run: |
          mkdir -p dist
          deno compile \
            --allow-net \
            --allow-read \
            --allow-write \
            --allow-env \
            --target ${{ matrix.target.deno_target }} \
            --output ${{ matrix.target.output }} \
            daemon.ts

      # ── 4. Upload binary as workflow artifact ────────────────────────────
      # Each matrix job uploads its binary. The release job below downloads
      # all four and attaches them to the GitHub Release.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: ${{ matrix.target.output }}
          retention-days: 1

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  # Runs after all four compile jobs succeed. Downloads all binaries and
  # creates (or updates) the GitHub Release for this tag.
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Download all four binaries uploaded by the build jobs above.
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      # List what we downloaded — useful for debugging if a file is missing.
      - name: List dist/
        run: find dist/ -type f | sort

      # Extract the version from the tag name (strips the leading "v").
      # e.g. refs/tags/v1.2.3 → 1.2.3
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Create the GitHub Release and attach all four binaries.
      # The release body is auto-generated from the tag annotation, or
      # falls back to a generic message. Edit the body: field to customise.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Chalie Interface v${{ steps.version.outputs.VERSION }}

            ### Installation

            Download the binary for your platform and install via the Chalie dashboard.

            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `daemon-linux-x64` |
            | macOS Intel | `daemon-mac-x64` |
            | macOS Apple Silicon | `daemon-mac-arm64` |
            | Windows x86_64 | `daemon-windows-x64.exe` |

            All binaries are self-contained — no Deno or runtime installation required.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/daemon-linux-x64/daemon-linux-x64
            dist/daemon-mac-x64/daemon-mac-x64
            dist/daemon-mac-arm64/daemon-mac-arm64
            dist/daemon-windows-x64.exe/daemon-windows-x64.exe
